<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Büyükçekmece Bilgi İşlem - Büyükçekmece Siteleri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container fade-in">
    <!-- Shared Navigation (Scope isolated for Büyükçekmece Siteleri) -->
    <div id="navbar-container"></div>

    <header class="page-header" style="margin-bottom: 20px;">
      <h1 class="page-title">Büyükçekmece Siteleri</h1>
      <p class="page-subtitle">Sadece Büyükçekmece Belediyesi kurumsal sistemler ve vatandaş portal adresleri rehberi.</p>
    </header>

    <main class="card-section">
      <!-- Search & Tab Filter Bar -->
      <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px;">
        <div style="position: relative; max-width: 480px;">
          <input id="search" class="input-control" type="search" placeholder="Büyükçekmece sitelerinde ara..." aria-label="Site ara" style="padding-left: 40px;" />
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary);">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>

        <!-- Kurum & Vatandaş Category Tabs -->
        <div class="pills-container" id="bcekmece-tabs" style="margin-bottom: 0;">
          <button type="button" class="pill active" data-tab="Tümü">Tümü (<span id="count-all">0</span>)</button>
          <button type="button" class="pill" data-tab="Kurum">Kurum (<span id="count-kurum">0</span>)</button>
          <button type="button" class="pill" data-tab="Vatandaş">Vatandaş (<span id="count-vatandas">0</span>)</button>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loading" class="card-group" style="text-align: center; padding: 30px 20px;">
        <div class="skeleton-loader">
          <div class="skeleton-line" style="width: 30%"></div>
          <div class="skeleton-line" style="width: 80%"></div>
          <div class="skeleton-line" style="width: 60%"></div>
        </div>
      </div>

      <!-- Status Box -->
      <div id="status" class="alert" style="display:none; margin-bottom: 16px;"></div>

      <!-- Compact Grid Container (Identical to Büyükçekmece Uygulamaları design) -->
      <div id="site-grid" class="zapp-grid" style="display:none;"></div>
    </main>
  </div>

  <script src="not.js"></script>
  <script src="app.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');
    const siteGrid = document.getElementById('site-grid');
    const searchInput = document.getElementById('search');

    const siteConfig = window.not || window.siteConfig || {};
    const googleSheetId = siteConfig.d1 || siteConfig.googleSheetId || '';
    const googleSheetTab = siteConfig.d2 || siteConfig.googleSheetTab || '';

    let allSites = [];
    let activeTab = 'Tümü';

    function setStatus(text, isError = false) {
      if (!text) {
        statusEl.style.display = 'none';
        return;
      }
      statusEl.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>${text}</span>
      `;
      statusEl.className = isError ? 'alert alert-warning fade-in' : 'alert alert-info fade-in';
      statusEl.style.display = 'flex';
    }

    function getSiteGroup(site) {
      const cat = (site.category || '').toLowerCase();
      if (cat.includes('kurum')) return 'Kurum';
      return 'Vatandaş';
    }

    function parseGoogleSheetData(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\((.*)\);/s);
      if (!match) return [];
      const json = JSON.parse(match[1]);
      const cols = json.table.cols.map(col => (col.label || col.id || '').trim().toLowerCase());
      const rows = json.table.rows || [];
      const mapHeader = header => {
        const key = header.trim().toLowerCase();
        if (/^name$|^title$|^site$/i.test(key)) return 'name';
        if (/^url$|^link$|^adres$/i.test(key)) return 'url';
        if (/^description$|^desc$|^açıklama$/i.test(key)) return 'description';
        if (/^category$|^kategori$/i.test(key)) return 'category';
        if (/^favorite$|^favourite$|^star$|^sık kullanılan$/i.test(key)) return 'favorite';
        if (/^alwaysopen$|^always_open$|^always open$|^her zaman$/i.test(key)) return 'alwaysOpen';
        if (/^group$|^grup$/i.test(key)) return 'group';
        return null;
      };
      const headers = cols.map(mapHeader);
      return rows.map(row => {
        const site = {};
        row.c.forEach((cell, index) => {
          const field = headers[index];
          if (!field || !cell) return;
          const value = cell.v != null ? cell.v : (cell.f || '');
          site[field] = String(value).trim();
        });
        return site;
      }).filter(site => {
        if (!site.name || !site.url) return false;
        const cat = (site.category || '').toLowerCase();
        // Strict filter: ONLY 'bmece siteler kurum' and 'bmece siteler vatandaş' / 'bmece vatandaş'
        return cat.includes('bmece siteler kurum') || cat.includes('bmece siteler vatandaş') || cat.includes('bmece vatandaş');
      });
    }

    function updateTabCounts() {
      document.getElementById('count-all').textContent = allSites.length;
      document.getElementById('count-kurum').textContent = allSites.filter(s => getSiteGroup(s) === 'Kurum').length;
      document.getElementById('count-vatandas').textContent = allSites.filter(s => getSiteGroup(s) === 'Vatandaş').length;
    }

    function setupTabs() {
      const tabButtons = document.querySelectorAll('#bcekmece-tabs .pill');
      tabButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          tabButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeTab = btn.dataset.tab;
          filterAndRenderSites();
        });
      });
    }

    function filterAndRenderSites() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = allSites.filter(site => {
        const groupName = getSiteGroup(site);
        const matchesTab = activeTab === 'Tümü' ? true : groupName === activeTab;
        const matchesQuery = site.name.toLowerCase().includes(query) ||
          (site.description || '').toLowerCase().includes(query) ||
          site.url.toLowerCase().includes(query);
        return matchesTab && matchesQuery;
      });
      renderGrid(filtered);
    }

    function getDomain(url) {
      try {
        return new URL(url).hostname;
      } catch {
        return url;
      }
    }

    function renderGrid(sitesToRender) {
      loadingEl.style.display = 'none';
      if (!sitesToRender || sitesToRender.length === 0) {
        siteGrid.style.display = 'none';
        setStatus('Seçilen kriterlere uygun Büyükçekmece sitesi bulunamadı.');
        return;
      }

      setStatus('');
      siteGrid.innerHTML = '';
      siteGrid.style.display = 'grid';

      sitesToRender.forEach(site => {
        const card = document.createElement('div');
        card.className = 'zapp-card';

        const groupName = getSiteGroup(site);
        const badgeClass = groupName === 'Kurum' ? 'badge-kurum' : 'badge-vatandas';
        const faviconUrl = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(site.url)}&sz=128`;

        card.innerHTML = `
          <div class="zapp-card-header">
            <h2 class="zapp-title">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              </svg>
              ${site.name}
            </h2>
            <span class="zapp-badge ${badgeClass}">${groupName}</span>
          </div>

          <div class="zapp-card-body">
            <!-- Favicon / Logo Image Container -->
            <div class="zapp-image-container" style="background: var(--bg-tertiary);">
              <img src="${faviconUrl}" alt="${site.name} Logosu" style="width: 54px; height: 54px; object-fit: contain;" onerror="this.parentElement.innerHTML='<div class=\\'zapp-image-placeholder\\'><svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'28\\' height=\\'28\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><path d=\\'M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71\\'/><path d=\\'M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71\\'/></svg><span>${getDomain(site.url)}</span></div>'" />
            </div>

            <!-- Description -->
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 0; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
              ${site.description || getDomain(site.url)}
            </p>

            <!-- Action Button -->
            <div class="zapp-action-row" style="margin-top: auto;">
              <a href="${site.url}" target="_blank" rel="noopener" class="zapp-btn-store zapp-btn-ios" style="flex: 1;">
                Adrese Git
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                  <polyline points="15 3 21 3 21 9"></polyline>
                  <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
              </a>
            </div>
          </div>
        `;

        siteGrid.appendChild(card);
      });
    }

    async function loadSites() {
      setupTabs();
      if (!googleSheetId) {
        loadingEl.style.display = 'none';
        setStatus('Google Sheet ID ayarlı değil.', true);
        return;
      }

      const sheetNameQuery = googleSheetTab ? `&sheet=${encodeURIComponent(googleSheetTab)}` : '';
      const url = `https://docs.google.com/spreadsheets/d/${googleSheetId}/gviz/tq?tqx=out:json${sheetNameQuery}`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Fetch failed');
        const text = await response.text();
        allSites = parseGoogleSheetData(text);
        updateTabCounts();
        filterAndRenderSites();
      } catch (err) {
        console.error(err);
        loadingEl.style.display = 'none';
        setStatus('Büyükçekmece Siteleri yüklenirken bir hata oluştu.', true);
      }
    }

    searchInput.addEventListener('input', filterAndRenderSites);
    loadSites();
  </script>
</body>
</html>
